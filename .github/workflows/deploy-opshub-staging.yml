name: Deploy OpsHub Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: opshub-staging-deploy
  cancel-in-progress: false

env:
  OPSHUB_PUBLIC_BASE_URL: https://opshub-staging.hoanghochoi.com
  OPSHUB_API_BASE_URL: https://opshub-staging.hoanghochoi.com/api
  OPSHUB_DOWNLOAD_PUBLIC_BASE_URL: https://opshub.hoanghochoi.com/staging-download
  OPSHUB_REMOTE_APP_DIR: /home/hhh/phongvu-opshub-staging
  OPSHUB_ENV_FILE: /srv/opshub-staging/env
  OPSHUB_SSD_ROOT: /srv/opshub-staging
  COMPOSE_PROJECT_NAME: opshub_staging

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      windows_build_name: ${{ steps.version.outputs.windows_build_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      apk_name: ${{ steps.version.outputs.apk_name }}
      windows_zip_name: ${{ steps.version.outputs.windows_zip_name }}
      windows_installer_basename: ${{ steps.version.outputs.windows_installer_basename }}
      windows_installer_name: ${{ steps.version.outputs.windows_installer_name }}
      windows_checksum_name: ${{ steps.version.outputs.windows_checksum_name }}
      release_notes: ${{ steps.version.outputs.release_notes }}
    steps:
      - name: Compute staging release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          windows_build_name="$(date -u +%Y).$(date -u +%-m).$(date -u +%-d)"
          version_code="$((200000 + GITHUB_RUN_NUMBER))"
          apk_name="phongvu-opshub-staging-v${version_name}+${version_code}.apk"
          windows_zip_name="phongvu-opshub-staging-windows-v${version_name}+${version_code}.zip"
          windows_installer_basename="phongvu-opshub-staging-windows-setup-v${version_name}+${version_code}"
          windows_installer_name="${windows_installer_basename}.exe"
          windows_checksum_name="phongvu-opshub-staging-windows-v${version_name}+${version_code}.sha256"
          release_notes="Staging GitHub ${GITHUB_SHA::7}"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "windows_build_name=${windows_build_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${apk_name}" >> "$GITHUB_OUTPUT"
          echo "windows_zip_name=${windows_zip_name}" >> "$GITHUB_OUTPUT"
          echo "windows_installer_basename=${windows_installer_basename}" >> "$GITHUB_OUTPUT"
          echo "windows_installer_name=${windows_installer_name}" >> "$GITHUB_OUTPUT"
          echo "windows_checksum_name=${windows_checksum_name}" >> "$GITHUB_OUTPUT"
          echo "release_notes=${release_notes}" >> "$GITHUB_OUTPUT"

  build_android:
    runs-on: ubuntu-latest
    needs: prepare
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Prepare Android SDK and JDK
        shell: bash
        run: |
          set -euo pipefail
          export JAVA_HOME="${JAVA_HOME_17_X64:-$JAVA_HOME}"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.1.0" >/dev/null

      - name: Configure Android staging signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_STAGING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_STAGING_KEYSTORE_BASE64 is required for staging APK signing." >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Build staging APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STAGING_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_STAGING_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_STAGING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for key in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "${key/ANDROID_/ANDROID_STAGING_} is required for staging APK signing." >&2
              exit 1
            fi
          done
          flutter pub get
          flutter build apk --release \
            --flavor staging \
            --build-name "${{ needs.prepare.outputs.version_name }}" \
            --build-number "${{ needs.prepare.outputs.version_code }}" \
            --dart-define "API_BASE_URL=${OPSHUB_API_BASE_URL}" \
            --dart-define "APP_ENV=staging"

      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_STAGING_VPS_HOST || '100.127.127.89' }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_STAGING_VPS_HOST || '100.127.127.89' }}
          VPS_PORT: ${{ secrets.OPSHUB_STAGING_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_STAGING_VPS_USER || 'hhh' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "OPSHUB_STAGING_SSH_KEY is required." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_staging_deploy_key
          chmod 600 ~/.ssh/opshub_staging_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-staging"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_staging_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Upload staging APK
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}/android"
          ssh opshub-staging "mkdir -p '$staging_dir'"
          scp 'build/app/outputs/flutter-apk/app-staging-release.apk' \
            "opshub-staging:${staging_dir}/${{ needs.prepare.outputs.apk_name }}"

  build_windows:
    runs-on: windows-latest
    needs: prepare
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Apply Windows staging icon
        shell: pwsh
        run: .\scripts\apply-staging-icons.ps1 -Platform windows

      - name: Build Windows staging release
        shell: pwsh
        env:
          WINDOWS_UPDATE_SIGNER_SHA256: ${{ vars.WINDOWS_STAGING_UPDATE_SIGNER_SHA256 }}
        run: |
          $pins = @($env:WINDOWS_UPDATE_SIGNER_SHA256 -split '[,;\s]+' | Where-Object { $_ })
          if ($pins.Count -eq 0 -or @($pins | Where-Object { $_ -notmatch '^[0-9A-Fa-f]{64}$' }).Count -gt 0) {
            throw 'WINDOWS_STAGING_UPDATE_SIGNER_SHA256 must contain one or more SHA-256 certificate fingerprints.'
          }
          flutter pub get
          flutter build windows --release `
            --build-name "${{ needs.prepare.outputs.windows_build_name }}" `
            --build-number "${{ needs.prepare.outputs.version_code }}" `
            --dart-define "API_BASE_URL=${env:OPSHUB_API_BASE_URL}" `
            --dart-define "WINDOWS_UPDATE_SIGNER_SHA256=${env:WINDOWS_UPDATE_SIGNER_SHA256}" `
            --dart-define "APP_ENV=staging"

      - name: Configure Windows staging signing certificate
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_STAGING_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_STAGING_SIGNING_PFX_PASSWORD }}
          WINDOWS_UPDATE_SIGNER_SHA256: ${{ vars.WINDOWS_STAGING_UPDATE_SIGNER_SHA256 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64)) {
            throw 'WINDOWS_STAGING_SIGNING_PFX_BASE64 is required; unsigned Windows staging artifacts are forbidden.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PASSWORD)) {
            throw 'WINDOWS_STAGING_SIGNING_PFX_PASSWORD is required when WINDOWS_STAGING_SIGNING_PFX_BASE64 is configured.'
          }
          $certPath = Join-Path $env:RUNNER_TEMP 'opshub-staging-windows-signing.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $certPath,
            $env:WINDOWS_SIGNING_PFX_PASSWORD,
            [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          )
          try {
            $algorithm = [System.Security.Cryptography.HashAlgorithmName]::SHA256
            $actualPin = $cert.GetCertHashString($algorithm).ToUpperInvariant()
            $trustedPins = @($env:WINDOWS_UPDATE_SIGNER_SHA256 -split '[,;\s]+' | ForEach-Object { $_.ToUpperInvariant() } | Where-Object { $_ })
            if ($actualPin -notin $trustedPins) {
              throw 'Windows staging signing certificate does not match WINDOWS_STAGING_UPDATE_SIGNER_SHA256.'
            }
          } finally {
            $cert.Dispose()
          }
          'WINDOWS_SIGNING_ENABLED=true' | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_SIGNING_PFX_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_UPDATE_SIGNER_SHA256=$env:WINDOWS_UPDATE_SIGNER_SHA256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign Windows staging executable
        if: env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_STAGING_SIGNING_PFX_PASSWORD }}
        run: |
          .\scripts\sign-windows-artifact.ps1 -Path 'build\windows\x64\runner\Release\phongvu_opshub.exe'

      - name: Zip Windows staging release
        shell: pwsh
        run: |
          $zipPath = Join-Path "build\windows\x64\runner" "${{ needs.prepare.outputs.windows_zip_name }}"
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath $zipPath `
            -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download Visual C++ Redistributable
        shell: pwsh
        run: |
          $prereqDir = New-Item -ItemType Directory -Force -Path "build\windows\prereqs"
          $vcRedistPath = Join-Path $prereqDir.FullName "vc_redist.x64.exe"
          $downloadUrl = "https://aka.ms/vc14/vc_redist.x64.exe"
          $maxAttempts = 5
          $downloaded = $false

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              if (Test-Path $vcRedistPath) {
                Remove-Item -LiteralPath $vcRedistPath -Force
              }
              Invoke-WebRequest `
                -Uri $downloadUrl `
                -OutFile $vcRedistPath `
                -MaximumRetryCount 3 `
                -RetryIntervalSec 2

              $vcRedist = Get-Item $vcRedistPath
              if ($vcRedist.Length -lt 1000000) {
                throw "Downloaded Visual C++ Redistributable is unexpectedly small: $($vcRedist.Length) bytes"
              }

              $signature = Get-AuthenticodeSignature $vcRedistPath
              if ($signature.Status -ne "Valid") {
                throw "Visual C++ Redistributable signature is not valid: $($signature.Status)"
              }

              "VC_REDIST_X64_PATH=$($vcRedist.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
              $downloaded = $true
              break
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Warning ("Attempt {0}/{1} to download Visual C++ Redistributable failed: {2}" -f $attempt, $maxAttempts, $_.Exception.Message)
              Start-Sleep -Seconds ([Math]::Min(30, $attempt * 5))
            }
          }

          if (-not $downloaded) {
            throw "Failed to download Visual C++ Redistributable after $maxAttempts attempts."
          }

      - name: Build Windows staging installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }
          $releaseDir = (Resolve-Path "build\windows\x64\runner\Release").Path
          $outputDir = (Resolve-Path "build\windows\x64\runner").Path
          $isccArgs = @(
            '"' + $iscc + '"',
            '/DAppName="PhongVu OpsHub Staging"',
            '/DAppPublisher="PhongVu OpsHub Staging"',
            '/DAppId="{{6E36D5C9-22C7-48D1-B907-9C8C8C72E77F}"',
            '/DDefaultDirName="{localappdata}\Programs\PhongVu OpsHub Staging"',
            '/DAppVersion="${{ needs.prepare.outputs.version_name }}"',
            '/DSourceDir="' + $releaseDir + '"',
            '/DVcRedistPath="' + $env:VC_REDIST_X64_PATH + '"',
            '/DOutputDir="' + $outputDir + '"',
            '/DOutputBaseFilename="${{ needs.prepare.outputs.windows_installer_basename }}"'
          )
          $isccArgs += '"deploy\windows\phongvu-opshub.iss"'
          $isccCommand = $isccArgs -join ' '
          cmd.exe /c $isccCommand
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE."
          }

      - name: Sign Windows staging installer
        if: env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_STAGING_SIGNING_PFX_PASSWORD }}
        run: |
          .\scripts\sign-windows-artifact.ps1 -Path 'build\windows\x64\runner\${{ needs.prepare.outputs.windows_installer_name }}'

      - name: Scan final Windows staging artifacts with Microsoft Defender
        shell: pwsh
        run: |
          .\scripts\scan-windows-artifact-defender.ps1 -Path @(
            'build\windows\x64\runner\${{ needs.prepare.outputs.windows_zip_name }}',
            'build\windows\x64\runner\${{ needs.prepare.outputs.windows_installer_name }}'
          )

      - name: Write Windows staging checksums
        shell: pwsh
        run: |
          $runnerDir = 'build\windows\x64\runner'
          $checksumPath = Join-Path $runnerDir '${{ needs.prepare.outputs.windows_checksum_name }}'
          $files = @(
            '${{ needs.prepare.outputs.windows_zip_name }}',
            '${{ needs.prepare.outputs.windows_installer_name }}'
          )
          $lines = foreach ($file in $files) {
            $path = Join-Path $runnerDir $file
            if (-not (Test-Path $path)) {
              throw ('Missing Windows artifact for checksum: {0}' -f $file)
            }
            $hash = (Get-FileHash -Algorithm SHA256 -Path $path).Hash.ToLowerInvariant()
            '{0}  {1}' -f $hash, $file
          }
          Set-Content -Path $checksumPath -Value $lines -Encoding ascii

      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_STAGING_VPS_HOST || '100.127.127.89' }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_STAGING_VPS_HOST || '100.127.127.89' }}
          VPS_PORT: ${{ secrets.OPSHUB_STAGING_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_STAGING_VPS_USER || 'hhh' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "OPSHUB_STAGING_SSH_KEY is required." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_staging_deploy_key
          chmod 600 ~/.ssh/opshub_staging_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-staging"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_staging_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Upload Windows staging artifacts
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}/windows"
          ssh opshub-staging "mkdir -p '$staging_dir'"
          scp \
            'build/windows/x64/runner/${{ needs.prepare.outputs.windows_zip_name }}' \
            'build/windows/x64/runner/${{ needs.prepare.outputs.windows_installer_name }}' \
            'build/windows/x64/runner/${{ needs.prepare.outputs.windows_checksum_name }}' \
            "opshub-staging:${staging_dir}/"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_android
      - build_windows
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: Build staging web app
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/apply-staging-icons.ps1 -Platform web
          flutter pub get
          flutter build web --release \
            --no-web-resources-cdn \
            --build-name "${{ needs.prepare.outputs.version_name }}" \
            --build-number "${{ needs.prepare.outputs.version_code }}" \
            --dart-define "API_BASE_URL=${OPSHUB_API_BASE_URL}" \
            --dart-define "APP_ENV=staging"
          WEB_CACHE_BUST_TOKEN="${GITHUB_SHA}" node scripts/patch-flutter-web-cache-busting.mjs

      - name: Connect Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_STAGING_VPS_HOST || '100.127.127.89' }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_STAGING_VPS_HOST || '100.127.127.89' }}
          VPS_PORT: ${{ secrets.OPSHUB_STAGING_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_STAGING_VPS_USER || 'hhh' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "OPSHUB_STAGING_SSH_KEY is required." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_staging_deploy_key
          chmod 600 ~/.ssh/opshub_staging_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-staging"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_staging_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Promote staged client artifacts
        shell: bash
        run: |
          set -euo pipefail
          downloads_dir="${OPSHUB_SSD_ROOT}/downloads"
          client_staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}"
          ssh opshub-staging \
            "CLIENT_STAGING_DIR='$client_staging_dir' \
             DOWNLOADS_DIR='$downloads_dir' \
             APK_NAME='${{ needs.prepare.outputs.apk_name }}' \
             WINDOWS_ZIP_NAME='${{ needs.prepare.outputs.windows_zip_name }}' \
             WINDOWS_INSTALLER_NAME='${{ needs.prepare.outputs.windows_installer_name }}' \
             WINDOWS_CHECKSUM_NAME='${{ needs.prepare.outputs.windows_checksum_name }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          android_artifact="$CLIENT_STAGING_DIR/android/$APK_NAME"
          windows_zip="$CLIENT_STAGING_DIR/windows/$WINDOWS_ZIP_NAME"
          windows_installer="$CLIENT_STAGING_DIR/windows/$WINDOWS_INSTALLER_NAME"
          windows_checksum="$CLIENT_STAGING_DIR/windows/$WINDOWS_CHECKSUM_NAME"

          for file in "$android_artifact" "$windows_zip" "$windows_installer" "$windows_checksum"; do
            if [ ! -s "$file" ]; then
              echo "Missing staged client artifact: $file" >&2
              exit 1
            fi
          done

          sudo mkdir -p "$DOWNLOADS_DIR"
          sudo install -m 0644 "$android_artifact" "$DOWNLOADS_DIR/$APK_NAME"
          sudo install -m 0644 "$windows_zip" "$DOWNLOADS_DIR/$WINDOWS_ZIP_NAME"
          sudo install -m 0644 "$windows_installer" "$DOWNLOADS_DIR/$WINDOWS_INSTALLER_NAME"
          sudo install -m 0644 "$windows_checksum" "$DOWNLOADS_DIR/$WINDOWS_CHECKSUM_NAME"
          REMOTE

      - name: Write staging download manifest
        shell: bash
        env:
          OPSHUB_PUBLIC_BASE_URL: ${{ env.OPSHUB_DOWNLOAD_PUBLIC_BASE_URL }}
          DOWNLOAD_MANIFEST_OUTPUT: dist/downloads/latest.json
          APP_VERSION: ${{ needs.prepare.outputs.version_name }}
          APP_BUILD_NUMBER: ${{ needs.prepare.outputs.version_code }}
          APP_RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
          APK_FILE_NAME: ${{ needs.prepare.outputs.apk_name }}
          WINDOWS_INSTALLER_FILE_NAME: ${{ needs.prepare.outputs.windows_installer_name }}
          WINDOWS_ZIP_FILE_NAME: ${{ needs.prepare.outputs.windows_zip_name }}
          WINDOWS_CHECKSUM_FILE_NAME: ${{ needs.prepare.outputs.windows_checksum_name }}
        run: |
          set -euo pipefail
          downloads_dir="${OPSHUB_SSD_ROOT}/downloads"
          APK_FILE_SIZE_BYTES="$(ssh opshub-staging "sudo stat -c%s '$downloads_dir/${{ needs.prepare.outputs.apk_name }}'")"
          WINDOWS_INSTALLER_FILE_SIZE_BYTES="$(ssh opshub-staging "sudo stat -c%s '$downloads_dir/${{ needs.prepare.outputs.windows_installer_name }}'")"
          WINDOWS_ZIP_FILE_SIZE_BYTES="$(ssh opshub-staging "sudo stat -c%s '$downloads_dir/${{ needs.prepare.outputs.windows_zip_name }}'")"
          WINDOWS_CHECKSUM_FILE_SIZE_BYTES="$(ssh opshub-staging "sudo stat -c%s '$downloads_dir/${{ needs.prepare.outputs.windows_checksum_name }}'")"
          export APK_FILE_SIZE_BYTES WINDOWS_INSTALLER_FILE_SIZE_BYTES WINDOWS_ZIP_FILE_SIZE_BYTES WINDOWS_CHECKSUM_FILE_SIZE_BYTES
          node scripts/download-manifest.mjs from-published

      - name: Upload app bundle and staging download metadata
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-runtime-release.mjs
          tar -C docs/help -czf dist/help-assets.tar.gz assets
          tar -C build/web -czf dist/web.tar.gz .
          remote_release_dir="${OPSHUB_REMOTE_APP_DIR}/releases/${GITHUB_SHA}"
          downloads_dir="${OPSHUB_SSD_ROOT}/downloads"
          web_dir="${OPSHUB_SSD_ROOT}/web"
          tmp_dir="${OPSHUB_REMOTE_APP_DIR}/tmp/${GITHUB_RUN_ID}"
          ssh opshub-staging "mkdir -p '$remote_release_dir' '$tmp_dir'"
          rsync -az --delete 'dist/runtime-release/' \
            "opshub-staging:${remote_release_dir}/"
          scp 'dist/downloads/latest.json' "opshub-staging:${tmp_dir}/latest.json"
          scp 'deploy/home-server/download.html' "opshub-staging:${tmp_dir}/download.html"
          scp 'web/icons/Icon-192.png' "opshub-staging:${tmp_dir}/opshub-icon-192.png"
          scp 'dist/help-assets.tar.gz' "opshub-staging:${tmp_dir}/help-assets.tar.gz"
          scp 'dist/web.tar.gz' "opshub-staging:${tmp_dir}/web.tar.gz"
          ssh opshub-staging \
            "DOWNLOADS_DIR='$downloads_dir' WEB_DIR='$web_dir' TMP_DIR='$tmp_dir' bash -s" <<'REMOTE'
          set -euo pipefail
          sudo mkdir -p "$DOWNLOADS_DIR"
          sudo install -m 0644 "$TMP_DIR/latest.json" "$DOWNLOADS_DIR/latest.json"
          sudo install -m 0644 "$TMP_DIR/download.html" "$DOWNLOADS_DIR/download.html"
          sudo install -m 0644 "$TMP_DIR/opshub-icon-192.png" "$DOWNLOADS_DIR/opshub-icon-192.png"
          case "$DOWNLOADS_DIR" in
            */downloads) ;;
            *) echo "Refusing to replace Help assets outside a downloads directory: $DOWNLOADS_DIR" >&2; exit 1 ;;
          esac
          sudo rm -rf "$DOWNLOADS_DIR/help/assets"
          sudo mkdir -p "$DOWNLOADS_DIR/help"
          sudo tar -xzf "$TMP_DIR/help-assets.tar.gz" -C "$DOWNLOADS_DIR/help"
          case "$WEB_DIR" in
            */web) ;;
            *) echo "Refusing to replace web bundle outside a web directory: $WEB_DIR" >&2; exit 1 ;;
          esac
          sudo rm -rf "$WEB_DIR"
          sudo mkdir -p "$WEB_DIR"
          sudo tar -xzf "$TMP_DIR/web.tar.gz" -C "$WEB_DIR"
          rm -rf "$TMP_DIR"
          REMOTE

      - name: Deploy staging backend and publish version metadata
        shell: bash
        run: |
          set -euo pipefail
          remote_release_dir="${OPSHUB_REMOTE_APP_DIR}/releases/${GITHUB_SHA}"
          client_staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}"
          android_update_url="${OPSHUB_DOWNLOAD_PUBLIC_BASE_URL}/downloads/${{ needs.prepare.outputs.apk_name }}"
          windows_update_url="${OPSHUB_DOWNLOAD_PUBLIC_BASE_URL}/downloads/${{ needs.prepare.outputs.windows_installer_name }}"
          downloads_dir="${OPSHUB_SSD_ROOT}/downloads"
          android_package_sha256="$(ssh opshub-staging "sha256sum '$downloads_dir/${{ needs.prepare.outputs.apk_name }}' | awk '{print \$1}'")"
          windows_package_sha256="$(ssh opshub-staging "sha256sum '$downloads_dir/${{ needs.prepare.outputs.windows_installer_name }}' | awk '{print \$1}'")"
          android_package_size_bytes="$(ssh opshub-staging "stat -c%s '$downloads_dir/${{ needs.prepare.outputs.apk_name }}'")"
          windows_package_size_bytes="$(ssh opshub-staging "stat -c%s '$downloads_dir/${{ needs.prepare.outputs.windows_installer_name }}'")"
          windows_installer_args="/VERYSILENT,/SUPPRESSMSGBOXES,/NORESTART,/CLOSEAPPLICATIONS,/OPSHUBRELAUNCH=1"
          ssh opshub-staging \
            "REMOTE_RELEASE_DIR='$remote_release_dir' \
             CLIENT_STAGING_DIR='$client_staging_dir' \
             OPSHUB_REMOTE_APP_DIR='${OPSHUB_REMOTE_APP_DIR}' \
             CURRENT_DIR='${OPSHUB_REMOTE_APP_DIR}/current' \
             OPSHUB_ENV_FILE='$OPSHUB_ENV_FILE' \
             OPSHUB_SSD_ROOT='$OPSHUB_SSD_ROOT' \
             COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' \
             OPSHUB_PUBLIC_BASE_URL='$OPSHUB_PUBLIC_BASE_URL' \
             APP_VERSION='${{ needs.prepare.outputs.version_name }}' \
             APP_BUILD_NUMBER='${{ needs.prepare.outputs.version_code }}' \
             ANDROID_UPDATE_URL='$android_update_url' \
             WINDOWS_UPDATE_URL='$windows_update_url' \
             ANDROID_PACKAGE_SHA256='$android_package_sha256' \
             WINDOWS_PACKAGE_SHA256='$windows_package_sha256' \
             ANDROID_PACKAGE_SIZE_BYTES='$android_package_size_bytes' \
             WINDOWS_PACKAGE_SIZE_BYTES='$windows_package_size_bytes' \
             WINDOWS_INSTALLER_ARGS='$windows_installer_args' \
             APP_RELEASE_NOTES='${{ needs.prepare.outputs.release_notes }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          if [ ! -s "$OPSHUB_ENV_FILE" ]; then
            echo "Missing staging env file: $OPSHUB_ENV_FILE" >&2
            echo "Run bash deploy/staging/bootstrap.sh on mementoamoris and replace placeholders first." >&2
            exit 1
          fi

          upsert_env() {
            key="$1"
            value="$2"
            escaped_value=$(printf '%s' "$value" | sed 's/[\/&]/\\&/g')
            if sudo grep -q "^${key}=" "$OPSHUB_ENV_FILE"; then
              sudo sed -i "s/^${key}=.*/${key}=${escaped_value}/" "$OPSHUB_ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$value" | sudo tee -a "$OPSHUB_ENV_FILE" >/dev/null
            fi
          }

          upsert_env OPSHUB_STAGING true
          upsert_env COMPOSE_PROJECT_NAME "$COMPOSE_PROJECT_NAME"
          upsert_env OPSHUB_DOMAIN "opshub-staging.hoanghochoi.com"
          upsert_env PUBLIC_BASE_URL "$OPSHUB_PUBLIC_BASE_URL"
          upsert_env OPSHUB_SSD_ROOT "$OPSHUB_SSD_ROOT"
          upsert_env OPSHUB_HTTP_BIND "127.0.0.1:8090"
          upsert_env OPSHUB_HTTPS_BIND "127.0.0.1:8443"
          upsert_env IMAGE_BASE_URL "${OPSHUB_PUBLIC_BASE_URL}/uploads"
          upsert_env ALLOWED_ORIGINS "$OPSHUB_PUBLIC_BASE_URL"

          upsert_env APP_VERSION "$APP_VERSION"
          upsert_env APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_MIN_SUPPORTED_BUILD "$APP_BUILD_NUMBER"
          upsert_env APP_UPDATE_URL "$ANDROID_UPDATE_URL"
          upsert_env APP_PACKAGE_URL "$ANDROID_UPDATE_URL"
          upsert_env APP_PACKAGE_SHA256 "$ANDROID_PACKAGE_SHA256"
          upsert_env APP_PACKAGE_SIZE_BYTES "$ANDROID_PACKAGE_SIZE_BYTES"
          upsert_env APP_PACKAGE_TYPE apk
          upsert_env APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_FORCE_UPDATE true

          upsert_env APP_ANDROID_APP_VERSION "$APP_VERSION"
          upsert_env APP_ANDROID_APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_ANDROID_APP_MIN_SUPPORTED_BUILD "$APP_BUILD_NUMBER"
          upsert_env APP_ANDROID_APP_UPDATE_URL "$ANDROID_UPDATE_URL"
          upsert_env APP_ANDROID_APP_PACKAGE_URL "$ANDROID_UPDATE_URL"
          upsert_env APP_ANDROID_APP_PACKAGE_SHA256 "$ANDROID_PACKAGE_SHA256"
          upsert_env APP_ANDROID_APP_PACKAGE_SIZE_BYTES "$ANDROID_PACKAGE_SIZE_BYTES"
          upsert_env APP_ANDROID_APP_PACKAGE_TYPE apk
          upsert_env APP_ANDROID_APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_ANDROID_APP_FORCE_UPDATE true

          upsert_env APP_WINDOWS_APP_VERSION "$APP_VERSION"
          upsert_env APP_WINDOWS_APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_WINDOWS_APP_MIN_SUPPORTED_BUILD "$APP_BUILD_NUMBER"
          upsert_env APP_WINDOWS_APP_UPDATE_URL "$WINDOWS_UPDATE_URL"
          upsert_env APP_WINDOWS_APP_PACKAGE_URL "$WINDOWS_UPDATE_URL"
          upsert_env APP_WINDOWS_APP_PACKAGE_SHA256 "$WINDOWS_PACKAGE_SHA256"
          upsert_env APP_WINDOWS_APP_PACKAGE_SIZE_BYTES "$WINDOWS_PACKAGE_SIZE_BYTES"
          upsert_env APP_WINDOWS_APP_PACKAGE_TYPE windowsInstaller
          upsert_env APP_WINDOWS_APP_INSTALLER_ARGS "$WINDOWS_INSTALLER_ARGS"
          upsert_env APP_WINDOWS_APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_WINDOWS_APP_FORCE_UPDATE true

          upsert_env APP_WEB_APP_VERSION "$APP_VERSION"
          upsert_env APP_WEB_APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_WEB_APP_MIN_SUPPORTED_BUILD 1
          upsert_env APP_WEB_APP_UPDATE_URL ""
          upsert_env APP_WEB_APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_WEB_APP_FORCE_UPDATE false

          docker run --rm \
            --env-file "$OPSHUB_ENV_FILE" \
            -v "$REMOTE_RELEASE_DIR/deploy/home-server/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile < /dev/null

          ln -sfn "$REMOTE_RELEASE_DIR" "${CURRENT_DIR}.next"
          mv -Tf "${CURRENT_DIR}.next" "$CURRENT_DIR"
          cd "$CURRENT_DIR"
          export COMPOSE_PROJECT_NAME OPSHUB_ENV_FILE
          compose=(docker compose --env-file "$OPSHUB_ENV_FILE" -f deploy/home-server/docker-compose.home.yml)
          compose_cmd() {
            "${compose[@]}" "$@" < /dev/null
          }

          compose_cmd config >/dev/null

          resolve_failed_node_feature_migration() {
            local migration_name="20260613190000_node_feature_assignments"
            local failed_count
            local table_exists

            compose_cmd up -d --no-recreate --wait postgres >/dev/null

            failed_count="$(
              compose_cmd \
                exec -T postgres sh -lc \
                'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT COUNT(*) FROM _prisma_migrations WHERE migration_name = '\''20260613190000_node_feature_assignments'\'' AND finished_at IS NULL AND rolled_back_at IS NULL;"'
            )"
            failed_count="$(printf '%s' "$failed_count" | tr -d '[:space:]')"
            if [ "${failed_count:-0}" = "0" ]; then
              return 0
            fi

            table_exists="$(
              compose_cmd \
                exec -T postgres sh -lc \
                'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT to_regclass('\''public.\"OrganizationNodeFeatureAssignment\"'\'') IS NOT NULL;"'
            )"
            table_exists="$(printf '%s' "$table_exists" | tr -d '[:space:]')"
            if [ "$table_exists" != "f" ]; then
              echo "Refusing to auto-resolve $migration_name because OrganizationNodeFeatureAssignment already exists." >&2
              exit 1
            fi

            echo "Resolving stale failed migration state for $migration_name before rerun."
            compose_cmd \
              --profile migrate run --rm -T --build migrate \
              npx prisma migrate resolve --rolled-back "$migration_name"
          }

          resolve_failed_quick_actions_migration() {
            local migration_name="20260713210000_quick_actions_v1"
            local failed_count
            local link_count

            compose_cmd up -d --no-recreate --wait postgres >/dev/null

            failed_count="$(
              compose_cmd \
                exec -T postgres sh -lc \
                'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT COUNT(*) FROM _prisma_migrations WHERE migration_name = '\''20260713210000_quick_actions_v1'\'' AND finished_at IS NULL AND rolled_back_at IS NULL;"'
            )"
            failed_count="$(printf '%s' "$failed_count" | tr -d '[:space:]')"
            if [ "${failed_count:-0}" = "0" ]; then
              return 0
            fi
            if [ "$failed_count" != "1" ]; then
              echo "Refusing to auto-resolve $migration_name because failed row count is $failed_count." >&2
              exit 1
            fi

            link_count="$(
              compose_cmd \
                exec -T postgres sh -lc \
                'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT COUNT(*) FROM \"QuickActionLink\";"'
            )"
            link_count="$(printf '%s' "$link_count" | tr -d '[:space:]')"
            if [ "${link_count:-0}" != "0" ]; then
              echo "Refusing to auto-resolve $migration_name because QuickActionLink contains $link_count rows." >&2
              exit 1
            fi

            echo "Resetting the empty partial QuickActionLink table for failed migration $migration_name."
            compose_cmd \
              exec -T postgres sh -lc \
              'psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c '\''DROP TABLE IF EXISTS "QuickActionLink";'\'''
            compose_cmd \
              --profile migrate run --rm -T --build migrate \
              npx prisma migrate resolve --rolled-back "$migration_name"
          }

          resolve_failed_node_feature_migration
          resolve_failed_quick_actions_migration

          compose_cmd --profile migrate run --rm -T --build migrate

          compose_cmd stop api realtime caddy || true
          compose_cmd rm -f api realtime caddy || true

          compose_cmd up -d --build --force-recreate --wait api realtime caddy

          expected_app_env="${APP_VERSION}|${APP_BUILD_NUMBER}|${APP_VERSION}|${APP_BUILD_NUMBER}|${APP_VERSION}|${APP_BUILD_NUMBER}|1|false"
          for attempt in {1..12}; do
            current_app_env="$(
              compose_cmd \
                exec -T api sh -lc \
                'printf "%s|%s|%s|%s|%s|%s|%s|%s" "$APP_ANDROID_APP_VERSION" "$APP_ANDROID_APP_BUILD_NUMBER" "$APP_WINDOWS_APP_VERSION" "$APP_WINDOWS_APP_BUILD_NUMBER" "$APP_WEB_APP_VERSION" "$APP_WEB_APP_BUILD_NUMBER" "$APP_WEB_APP_MIN_SUPPORTED_BUILD" "$APP_WEB_APP_FORCE_UPDATE"' \
                2>/dev/null || true
            )"
            if [ "$current_app_env" = "$expected_app_env" ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "API container app-version env mismatch after recreate: expected $expected_app_env got ${current_app_env:-<empty>}" >&2
              exit 1
            fi
            sleep 5
          done

          compose_cmd ps

          releases_dir="$(dirname "$REMOTE_RELEASE_DIR")"
          current_real="$(readlink -f "$CURRENT_DIR" || true)"
          mapfile -t release_dirs < <(find "$releases_dir" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' | sort -rn | awk '{print $2}')
          kept=0
          for dir in "${release_dirs[@]}"; do
            dir_real="$(readlink -f "$dir")"
            if [ "$dir_real" = "$current_real" ] || [ "$kept" -lt 5 ]; then
              kept=$((kept + 1))
              continue
            fi
            rm -rf "$dir"
          done

          downloads_dir="$OPSHUB_SSD_ROOT/downloads"
          mapfile -t client_files < <(sudo find "$downloads_dir" -maxdepth 1 -type f \( -name 'phongvu-opshub-staging-v*.apk' -o -name 'phongvu-opshub-staging-windows-v*.zip' -o -name 'phongvu-opshub-staging-windows-setup-v*.exe' -o -name 'phongvu-opshub-staging-windows-v*.sha256' \) -printf '%T@ %p\n' | sort -rn | awk '{print $2}')
          kept=0
          for file in "${client_files[@]}"; do
            if [ "$kept" -lt 20 ]; then
              kept=$((kept + 1))
              continue
            fi
            sudo rm -f "$file"
          done

          case "$CLIENT_STAGING_DIR" in
            "$OPSHUB_REMOTE_APP_DIR"/action-staging/*)
              rm -rf "$CLIENT_STAGING_DIR"
              ;;
            *)
              echo "Refusing to remove unexpected staging directory: $CLIENT_STAGING_DIR" >&2
              exit 1
              ;;
          esac
          REMOTE

      - name: Verify staging public health and version metadata
        shell: bash
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CF_ACCESS_CLIENT_ID}" || -z "${CF_ACCESS_CLIENT_SECRET}" ]]; then
            echo "Cloudflare Access service credentials are required for staging verification." >&2
            exit 1
          fi
          access_curl() {
            local url="$1"
            shift
            if [[ "$url" == "${OPSHUB_PUBLIC_BASE_URL}"* ]]; then
              curl "$@" \
                -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" \
                -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" \
                "$url"
              return
            fi
            curl "$@" "$url"
          }
          retry_curl() {
            local url="$1"
            local attempt
            local response_file
            local status
            for attempt in {1..12}; do
              response_file="$(mktemp)"
              if status="$(access_curl "$url" -sS -o "$response_file" -w '%{http_code}')"; then
                if [[ "$status" == 2* ]]; then
                  cat "$response_file"
                  rm -f "$response_file"
                  return 0
                fi
              fi
              rm -f "$response_file"
              sleep 5
            done
            echo "Staging verification did not receive a 2xx response from ${url}." >&2
            return 1
          }
          verify_security_headers() {
            local headers="$1"
            local header
            for header in \
              'content-security-policy:' \
              'strict-transport-security:.*max-age=31536000' \
              'x-content-type-options:.*nosniff' \
              'x-frame-options:.*sameorigin' \
              'referrer-policy:.*no-referrer' \
              'permissions-policy:'; do
              printf '%s\n' "$headers" | grep -Eqi "^${header}"
            done
            if printf '%s\n' "$headers" | grep -qi '^content-security-policy-report-only:'; then
              echo 'Staging still serves a report-only CSP.' >&2
              return 1
            fi
          }

          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/health"
          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/" >/dev/null
          main_headers="$(access_curl "${OPSHUB_PUBLIC_BASE_URL}/main.dart.js?v=${GITHUB_SHA}" -fsSI)"
          printf '%s\n' "$main_headers" | grep -qi 'cache-control:.*no-cache'
          verify_security_headers "$main_headers"
          android_json="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=android")"
          windows_json="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=windows")"
          web_json="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=web")"
          node -e "
            const android = JSON.parse(process.argv[1]);
            const windows = JSON.parse(process.argv[2]);
            const web = JSON.parse(process.argv[3]);
            const expectedBuild = Number(process.argv[4]);
            const publicBaseUrl = process.argv[5];
            for (const [platform, payload] of Object.entries({ android, windows, web })) {
              if (payload.latestBuild !== expectedBuild) {
                throw new Error(platform + ' latestBuild expected ' + expectedBuild + ', got ' + payload.latestBuild);
              }
            }
            for (const [platform, payload] of Object.entries({ android, windows })) {
              if (!String(payload.updateUrl || '').startsWith(publicBaseUrl + '/downloads/')) {
                throw new Error(platform + ' updateUrl does not point to staging downloads');
              }
              if (String(payload.updateUrl || '').includes('opshub.hoanghochoi.com/downloads/')) {
                throw new Error(platform + ' updateUrl points to production downloads');
              }
              if (payload.packageUrl !== payload.updateUrl) {
                throw new Error(platform + ' packageUrl must match updateUrl for self-update');
              }
              if (!/^[0-9a-f]{64}$/.test(String(payload.packageSha256 || ''))) {
                throw new Error(platform + ' packageSha256 is invalid');
              }
              if (!Number.isInteger(payload.packageSizeBytes) || payload.packageSizeBytes <= 0) {
                throw new Error(platform + ' packageSizeBytes is invalid');
              }
            }
            if (!String(android.updateUrl || '').endsWith('.apk')) throw new Error('Android updateUrl is not an APK');
            if (!String(windows.updateUrl || '').endsWith('.exe')) throw new Error('Windows updateUrl is not an installer EXE');
            if (android.packageType !== 'apk') throw new Error('Android packageType must be apk');
            if (windows.packageType !== 'windowsInstaller') throw new Error('Windows packageType must be windowsInstaller');
            if (!Array.isArray(windows.installerArgs) || !windows.installerArgs.includes('/VERYSILENT')) {
              throw new Error('Windows installerArgs must include /VERYSILENT');
            }
            if (!windows.installerArgs.includes('/OPSHUBRELAUNCH=1')) {
              throw new Error('Windows installerArgs must include /OPSHUBRELAUNCH=1');
            }
            if (web.platform !== 'web') throw new Error('Web app-version did not report platform=web');
            if (String(web.updateUrl || '') !== '') throw new Error('Web updateUrl must be empty');
            if (web.forceUpdate !== false) throw new Error('Web forceUpdate must be false');
            if (web.minSupportedBuild !== 1) throw new Error('Web minSupportedBuild must be 1');
          " "$android_json" "$windows_json" "$web_json" "${{ needs.prepare.outputs.version_code }}" "$OPSHUB_DOWNLOAD_PUBLIC_BASE_URL"
          curl -fIs "$(node -e "console.log(JSON.parse(process.argv[1]).packageUrl)" "$android_json")" >/dev/null
          curl -fIs "$(node -e "console.log(JSON.parse(process.argv[1]).packageUrl)" "$windows_json")" >/dev/null
          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/download" >/dev/null
          download_redirect_headers="$(curl -fsSI "${OPSHUB_DOWNLOAD_PUBLIC_BASE_URL}")"
          printf '%s\n' "$download_redirect_headers" |
            grep -qi '^www-authenticate: Cloudflare-Access '
          printf '%s\n' "$download_redirect_headers" |
            grep -Eqi '^location: https://[^/]+\.cloudflareaccess\.com/cdn-cgi/access/login/.*redirect_url=%2Fdownload'
          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/help" >/dev/null
          help_json="$(retry_curl "${OPSHUB_API_BASE_URL}/help-content/public")"
          manifest_json="$(retry_curl "${OPSHUB_DOWNLOAD_PUBLIC_BASE_URL}/downloads/latest.json")"
          node -e "
            const help = JSON.parse(process.argv[1]);
            const manifest = JSON.parse(process.argv[2]);
            const expectedVersion = process.argv[3];
            const expectedBuild = Number(process.argv[4]);
            const publicBaseUrl = process.argv[5];
            if (!Array.isArray(help.pages) || help.pages.length === 0) {
              throw new Error('Public help runtime snapshot is empty on staging');
            }
            if (manifest.version !== expectedVersion) throw new Error('Manifest version mismatch');
            if (manifest.build !== expectedBuild) throw new Error('Manifest build mismatch');
            for (const [key, file] of Object.entries(manifest.files || {})) {
              if (!file?.url || !file?.fileName || !Number.isInteger(file.sizeBytes) || file.sizeBytes <= 0) {
                throw new Error('Invalid manifest file entry: ' + key);
              }
              if (!file.url.startsWith(publicBaseUrl + '/downloads/')) {
                throw new Error('Manifest file does not point to staging: ' + key);
              }
              if (file.url.includes('opshub.hoanghochoi.com/downloads/')) {
                throw new Error('Manifest file points to production downloads: ' + key);
              }
            }
          " "$help_json" "$manifest_json" "${{ needs.prepare.outputs.version_name }}" "${{ needs.prepare.outputs.version_code }}" "$OPSHUB_DOWNLOAD_PUBLIC_BASE_URL"
          node -e "
            const manifest = JSON.parse(process.argv[1]);
            for (const file of Object.values(manifest.files)) console.log(file.url);
          " "$manifest_json" | while IFS= read -r url; do
            curl -fIs "$url" >/dev/null
          done
