name: CodeQL Security Scan

on:
  push:
    branches:
      - main
      - staging
    paths:
      - backend-go/**
      - backend-nest/**
      - .github/workflows/codeql.yml
  pull_request:
    branches:
      - main
      - staging
    paths:
      - backend-go/**
      - backend-nest/**
      - .github/workflows/codeql.yml
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - go

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild Go
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@1ad29ea4a422cce9a242a9fae469541dcd08addc

      - name: Analyze
        uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          category: /language:${{ matrix.language }}
