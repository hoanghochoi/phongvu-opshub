name: Deploy OpsHub

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_client_build:
        description: Deploy only the /download landing page and latest manifest from live artifacts.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  OPSHUB_PUBLIC_BASE_URL: https://opshub.hoanghochoi.com
  OPSHUB_API_BASE_URL: https://opshub.hoanghochoi.com/api
  OPSHUB_REMOTE_APP_DIR: /home/ubuntu/phongvu-opshub
  OPSHUB_ENV_FILE: /srv/opshub/env

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      windows_build_name: ${{ steps.version.outputs.windows_build_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      apk_name: ${{ steps.version.outputs.apk_name }}
      windows_zip_name: ${{ steps.version.outputs.windows_zip_name }}
      windows_installer_basename: ${{ steps.version.outputs.windows_installer_basename }}
      windows_installer_name: ${{ steps.version.outputs.windows_installer_name }}
      windows_checksum_name: ${{ steps.version.outputs.windows_checksum_name }}
      release_notes: ${{ steps.version.outputs.release_notes }}
    steps:
      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          windows_build_name="$(date -u +%Y).$(date -u +%-m).$(date -u +%-d)"
          version_code="$((100000 + GITHUB_RUN_NUMBER))"
          apk_name="phongvu-opshub-v${version_name}+${version_code}.apk"
          windows_zip_name="phongvu-opshub-windows-v${version_name}+${version_code}.zip"
          windows_installer_basename="phongvu-opshub-windows-setup-v${version_name}+${version_code}"
          windows_installer_name="${windows_installer_basename}.exe"
          release_notes="GitHub ${GITHUB_SHA::7}"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "windows_build_name=${windows_build_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${apk_name}" >> "$GITHUB_OUTPUT"
          echo "windows_zip_name=${windows_zip_name}" >> "$GITHUB_OUTPUT"
          echo "windows_installer_basename=${windows_installer_basename}" >> "$GITHUB_OUTPUT"
          echo "windows_installer_name=${windows_installer_name}" >> "$GITHUB_OUTPUT"
          echo "release_notes=${release_notes}" >> "$GITHUB_OUTPUT"
          windows_checksum_name=phongvu-opshub-windows-v${version_name}+${version_code}.sha256
          echo windows_checksum_name=${windows_checksum_name} >> $GITHUB_OUTPUT

  build_android:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_client_build != true }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required for upgrade-safe release APK signing." >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Build release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for key in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "$key secret is required for upgrade-safe release APK signing." >&2
              exit 1
            fi
          done
          flutter pub get
          flutter build apk --release \
            --flavor production \
            --build-name "${{ needs.prepare.outputs.version_name }}" \
            --build-number "${{ needs.prepare.outputs.version_code }}" \
            --dart-define "API_BASE_URL=${OPSHUB_API_BASE_URL}"

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_VPS_HOST }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_VPS_HOST }}
          VPS_PORT: ${{ secrets.OPSHUB_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_VPS_USER || 'ubuntu' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_deploy_key
          chmod 600 ~/.ssh/opshub_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-vps"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Upload APK to VPS staging
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}/android"
          ssh opshub-vps "mkdir -p '$staging_dir'"
          scp 'build/app/outputs/flutter-apk/app-production-release.apk' \
            "opshub-vps:${staging_dir}/${{ needs.prepare.outputs.apk_name }}"

  build_windows:
    runs-on: windows-latest
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_client_build != true }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        shell: pwsh
        run: |
          flutter pub get
          flutter build windows --release `
            --build-name "${{ needs.prepare.outputs.windows_build_name }}" `
            --build-number "${{ needs.prepare.outputs.version_code }}" `
            --dart-define "API_BASE_URL=${env:OPSHUB_API_BASE_URL}"

      - name: Configure Windows internal signing certificate
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64)) {
            Write-Warning 'WINDOWS_SIGNING_PFX_BASE64 is not configured; Windows artifacts will stay unsigned.'
            'WINDOWS_SIGNING_ENABLED=false' | Out-File -FilePath $env:GITHUB_ENV -Append
            return
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PASSWORD)) {
            throw 'WINDOWS_SIGNING_PFX_PASSWORD is required when WINDOWS_SIGNING_PFX_BASE64 is configured.'
          }
          $certPath = Join-Path $env:RUNNER_TEMP 'opshub-windows-signing.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certPath, $env:WINDOWS_SIGNING_PFX_PASSWORD)
          $publicCertPath = Join-Path $env:RUNNER_TEMP 'opshub-windows-signing.cer'
          [IO.File]::WriteAllBytes($publicCertPath, $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
          'WINDOWS_SIGNING_ENABLED=true' | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_SIGNING_PFX_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_SIGNING_CERT_PATH=$publicCertPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign Windows app executable
        if: env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          .\scripts\sign-windows-artifact.ps1 -Path 'build\windows\x64\runner\Release\phongvu_opshub.exe'

      - name: Zip Windows release
        shell: pwsh
        run: |
          $zipPath = Join-Path "build\windows\x64\runner" "${{ needs.prepare.outputs.windows_zip_name }}"
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath $zipPath `
            -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download Visual C++ Redistributable
        shell: pwsh
        run: |
          $prereqDir = New-Item -ItemType Directory -Force -Path "build\windows\prereqs"
          $vcRedistPath = Join-Path $prereqDir.FullName "vc_redist.x64.exe"
          $downloadUrl = "https://aka.ms/vc14/vc_redist.x64.exe"
          $maxAttempts = 5
          $downloaded = $false

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              if (Test-Path $vcRedistPath) {
                Remove-Item -LiteralPath $vcRedistPath -Force
              }
              Invoke-WebRequest `
                -Uri $downloadUrl `
                -OutFile $vcRedistPath `
                -MaximumRetryCount 3 `
                -RetryIntervalSec 2

              $vcRedist = Get-Item $vcRedistPath
              if ($vcRedist.Length -lt 1000000) {
                throw "Downloaded Visual C++ Redistributable is unexpectedly small: $($vcRedist.Length) bytes"
              }

              $signature = Get-AuthenticodeSignature $vcRedistPath
              if ($signature.Status -ne "Valid") {
                throw "Visual C++ Redistributable signature is not valid: $($signature.Status)"
              }

              "VC_REDIST_X64_PATH=$($vcRedist.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
              $downloaded = $true
              break
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Warning ("Attempt {0}/{1} to download Visual C++ Redistributable failed: {2}" -f $attempt, $maxAttempts, $_.Exception.Message)
              Start-Sleep -Seconds ([Math]::Min(30, $attempt * 5))
            }
          }

          if (-not $downloaded) {
            throw "Failed to download Visual C++ Redistributable after $maxAttempts attempts."
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "iscc"
          }
          $releaseDir = (Resolve-Path "build\windows\x64\runner\Release").Path
          $outputDir = (Resolve-Path "build\windows\x64\runner").Path
          $isccArgs = @(
            "/DAppVersion=${{ needs.prepare.outputs.version_name }}",
            "/DSourceDir=$releaseDir",
            "/DVcRedistPath=${env:VC_REDIST_X64_PATH}",
            "/DOutputDir=$outputDir",
            "/DOutputBaseFilename=${{ needs.prepare.outputs.windows_installer_basename }}"
          )
          if ($env:WINDOWS_SIGNING_ENABLED -eq 'true') {
            if (-not (Test-Path $env:WINDOWS_SIGNING_CERT_PATH)) {
              throw 'WINDOWS_SIGNING_CERT_PATH is missing while Windows signing is enabled.'
            }
            $isccArgs += "/DInternalCodeSigningCertPath=${env:WINDOWS_SIGNING_CERT_PATH}"
          }
          $isccArgs += 'deploy\windows\phongvu-opshub.iss'
          & $iscc @isccArgs

      - name: Sign Windows installer
        if: env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          .\scripts\sign-windows-artifact.ps1 -Path 'build\windows\x64\runner\${{ needs.prepare.outputs.windows_installer_name }}'

      - name: Write Windows checksums
        shell: pwsh
        run: |
          $runnerDir = 'build\windows\x64\runner'
          $checksumPath = Join-Path $runnerDir '${{ needs.prepare.outputs.windows_checksum_name }}'
          $files = @(
            '${{ needs.prepare.outputs.windows_zip_name }}',
            '${{ needs.prepare.outputs.windows_installer_name }}'
          )
          $lines = foreach ($file in $files) {
            $path = Join-Path $runnerDir $file
            if (-not (Test-Path $path)) {
              throw ('Missing Windows artifact for checksum: {0}' -f $file)
            }
            $hash = (Get-FileHash -Algorithm SHA256 -Path $path).Hash.ToLowerInvariant()
            '{0}  {1}' -f $hash, $file
          }
          Set-Content -Path $checksumPath -Value $lines -Encoding ascii

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_VPS_HOST }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_VPS_HOST }}
          VPS_PORT: ${{ secrets.OPSHUB_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_VPS_USER || 'ubuntu' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_deploy_key
          chmod 600 ~/.ssh/opshub_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-vps"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Upload Windows artifacts to VPS staging
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}/windows"
          ssh opshub-vps "mkdir -p '$staging_dir'"
          scp \
            'build/windows/x64/runner/${{ needs.prepare.outputs.windows_zip_name }}' \
            'build/windows/x64/runner/${{ needs.prepare.outputs.windows_installer_name }}' \
            'build/windows/x64/runner/${{ needs.prepare.outputs.windows_checksum_name }}' \
            "opshub-vps:${staging_dir}/"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_android
      - build_windows
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_client_build != true }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_VPS_HOST }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_VPS_HOST }}
          VPS_PORT: ${{ secrets.OPSHUB_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_VPS_USER || 'ubuntu' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_deploy_key
          chmod 600 ~/.ssh/opshub_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-vps"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Promote staged client artifacts
        shell: bash
        run: |
          set -euo pipefail
          client_staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}"
          ssh opshub-vps \
            "CLIENT_STAGING_DIR='$client_staging_dir' \
             APK_NAME='${{ needs.prepare.outputs.apk_name }}' \
             WINDOWS_ZIP_NAME='${{ needs.prepare.outputs.windows_zip_name }}' \
             WINDOWS_INSTALLER_NAME='${{ needs.prepare.outputs.windows_installer_name }}' \
             WINDOWS_CHECKSUM_NAME='${{ needs.prepare.outputs.windows_checksum_name }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          downloads_dir=/srv/opshub/downloads
          android_artifact="$CLIENT_STAGING_DIR/android/$APK_NAME"
          windows_zip="$CLIENT_STAGING_DIR/windows/$WINDOWS_ZIP_NAME"
          windows_installer="$CLIENT_STAGING_DIR/windows/$WINDOWS_INSTALLER_NAME"
          windows_checksum="$CLIENT_STAGING_DIR/windows/$WINDOWS_CHECKSUM_NAME"

          for file in "$android_artifact" "$windows_zip" "$windows_installer" "$windows_checksum"; do
            if [ ! -s "$file" ]; then
              echo "Missing staged client artifact: $file" >&2
              exit 1
            fi
          done

          mkdir -p "$downloads_dir"
          install -m 0644 "$android_artifact" "$downloads_dir/$APK_NAME"
          install -m 0644 "$windows_zip" "$downloads_dir/$WINDOWS_ZIP_NAME"
          install -m 0644 "$windows_installer" "$downloads_dir/$WINDOWS_INSTALLER_NAME"
          install -m 0644 "$windows_checksum" "$downloads_dir/$WINDOWS_CHECKSUM_NAME"
          REMOTE

      - name: Write download manifest
        shell: bash
        env:
          DOWNLOAD_MANIFEST_OUTPUT: dist/downloads/latest.json
          APP_VERSION: ${{ needs.prepare.outputs.version_name }}
          APP_BUILD_NUMBER: ${{ needs.prepare.outputs.version_code }}
          APP_RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
          APK_FILE_NAME: ${{ needs.prepare.outputs.apk_name }}
          WINDOWS_INSTALLER_FILE_NAME: ${{ needs.prepare.outputs.windows_installer_name }}
          WINDOWS_ZIP_FILE_NAME: ${{ needs.prepare.outputs.windows_zip_name }}
          WINDOWS_CHECKSUM_FILE_NAME: ${{ needs.prepare.outputs.windows_checksum_name }}
        run: |
          set -euo pipefail
          APK_FILE_SIZE_BYTES="$(ssh opshub-vps "stat -c%s '/srv/opshub/downloads/${{ needs.prepare.outputs.apk_name }}'")"
          WINDOWS_INSTALLER_FILE_SIZE_BYTES="$(ssh opshub-vps "stat -c%s '/srv/opshub/downloads/${{ needs.prepare.outputs.windows_installer_name }}'")"
          WINDOWS_ZIP_FILE_SIZE_BYTES="$(ssh opshub-vps "stat -c%s '/srv/opshub/downloads/${{ needs.prepare.outputs.windows_zip_name }}'")"
          WINDOWS_CHECKSUM_FILE_SIZE_BYTES="$(ssh opshub-vps "stat -c%s '/srv/opshub/downloads/${{ needs.prepare.outputs.windows_checksum_name }}'")"
          export \
            APK_FILE_SIZE_BYTES \
            WINDOWS_INSTALLER_FILE_SIZE_BYTES \
            WINDOWS_ZIP_FILE_SIZE_BYTES \
            WINDOWS_CHECKSUM_FILE_SIZE_BYTES
          node scripts/download-manifest.mjs from-published

      - name: Upload app bundle and download metadata
        shell: bash
        run: |
          set -euo pipefail
          remote_release_dir="${OPSHUB_REMOTE_APP_DIR}/releases/${GITHUB_SHA}"
          ssh opshub-vps "mkdir -p '$remote_release_dir' /srv/opshub/downloads"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.dart_tool/' \
            --exclude 'build/' \
            --exclude 'dist/' \
            ./ "opshub-vps:${remote_release_dir}/"
          scp 'dist/downloads/latest.json' \
            'opshub-vps:/srv/opshub/downloads/latest.json'
          scp 'deploy/home-server/download.html' \
            'opshub-vps:/srv/opshub/downloads/download.html'
          scp 'web/icons/Icon-192.png' \
            'opshub-vps:/srv/opshub/downloads/opshub-icon-192.png'

      - name: Deploy backend and publish version metadata
        shell: bash
        run: |
          set -euo pipefail
          remote_release_dir="${OPSHUB_REMOTE_APP_DIR}/releases/${GITHUB_SHA}"
          client_staging_dir="${OPSHUB_REMOTE_APP_DIR}/action-staging/${GITHUB_RUN_ID}"
          android_update_url="${OPSHUB_PUBLIC_BASE_URL}/downloads/${{ needs.prepare.outputs.apk_name }}"
          windows_update_url="${OPSHUB_PUBLIC_BASE_URL}/downloads/${{ needs.prepare.outputs.windows_installer_name }}"
          ssh opshub-vps \
            "REMOTE_RELEASE_DIR='$remote_release_dir' \
             CLIENT_STAGING_DIR='$client_staging_dir' \
             OPSHUB_REMOTE_APP_DIR='${OPSHUB_REMOTE_APP_DIR}' \
             CURRENT_DIR='${OPSHUB_REMOTE_APP_DIR}/current' \
             OPSHUB_ENV_FILE='$OPSHUB_ENV_FILE' \
             APP_VERSION='${{ needs.prepare.outputs.version_name }}' \
             APP_BUILD_NUMBER='${{ needs.prepare.outputs.version_code }}' \
             ANDROID_UPDATE_URL='$android_update_url' \
             WINDOWS_UPDATE_URL='$windows_update_url' \
             APP_RELEASE_NOTES='${{ needs.prepare.outputs.release_notes }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          sudo mkdir -p "$(dirname "$OPSHUB_ENV_FILE")"
          sudo touch "$OPSHUB_ENV_FILE"
          sudo chown root:"$(id -gn)" "$OPSHUB_ENV_FILE"
          sudo chmod 640 "$OPSHUB_ENV_FILE"

          upsert_env() {
            key="$1"
            value="$2"
            escaped_value=$(printf '%s' "$value" | sed 's/[\/&]/\\&/g')
            if sudo grep -q "^${key}=" "$OPSHUB_ENV_FILE"; then
              sudo sed -i "s/^${key}=.*/${key}=${escaped_value}/" "$OPSHUB_ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$value" | sudo tee -a "$OPSHUB_ENV_FILE" >/dev/null
            fi
          }

          upsert_env APP_VERSION "$APP_VERSION"
          upsert_env APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_MIN_SUPPORTED_BUILD "$APP_BUILD_NUMBER"
          upsert_env APP_UPDATE_URL "$ANDROID_UPDATE_URL"
          upsert_env APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_FORCE_UPDATE true

          upsert_env APP_ANDROID_APP_VERSION "$APP_VERSION"
          upsert_env APP_ANDROID_APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_ANDROID_APP_MIN_SUPPORTED_BUILD "$APP_BUILD_NUMBER"
          upsert_env APP_ANDROID_APP_UPDATE_URL "$ANDROID_UPDATE_URL"
          upsert_env APP_ANDROID_APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_ANDROID_APP_FORCE_UPDATE true

          upsert_env APP_WINDOWS_APP_VERSION "$APP_VERSION"
          upsert_env APP_WINDOWS_APP_BUILD_NUMBER "$APP_BUILD_NUMBER"
          upsert_env APP_WINDOWS_APP_MIN_SUPPORTED_BUILD "$APP_BUILD_NUMBER"
          upsert_env APP_WINDOWS_APP_UPDATE_URL "$WINDOWS_UPDATE_URL"
          upsert_env APP_WINDOWS_APP_RELEASE_NOTES "$APP_RELEASE_NOTES"
          upsert_env APP_WINDOWS_APP_FORCE_UPDATE true

          docker run --rm \
            --env-file "$OPSHUB_ENV_FILE" \
            -v "$REMOTE_RELEASE_DIR/deploy/home-server/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile < /dev/null

          previous_current="$(readlink -f "$CURRENT_DIR" || true)"
          remote_release_real="$(readlink -f "$REMOTE_RELEASE_DIR" || true)"
          ln -sfn "$REMOTE_RELEASE_DIR" "${CURRENT_DIR}.next"
          mv -Tf "${CURRENT_DIR}.next" "$CURRENT_DIR"
          cd "$CURRENT_DIR"
          export OPSHUB_ENV_FILE
          compose=(docker compose --env-file "$OPSHUB_ENV_FILE" -f deploy/home-server/docker-compose.home.yml)
          compose_cmd() {
            "${compose[@]}" "$@" < /dev/null
          }

          dump_deploy_diagnostics() {
            set +e
            echo "::group::Docker deployment diagnostics"
            compose_cmd ps
            compose_cmd logs --tail=200 api
            compose_cmd logs --tail=120 realtime
            compose_cmd logs --tail=120 caddy
            docker inspect home-server-api-1 --format '{{json .State.Health}}'
            echo "::endgroup::"
            set -e
          }

          rollback_to_release() {
            candidate="$1"
            if [ ! -d "$candidate" ]; then
              return 1
            fi
            echo "Attempting rollback to release: $candidate"
            ln -sfn "$candidate" "${CURRENT_DIR}.rollback"
            mv -Tf "${CURRENT_DIR}.rollback" "$CURRENT_DIR"
            cd "$CURRENT_DIR"
            compose=(docker compose --env-file "$OPSHUB_ENV_FILE" -f deploy/home-server/docker-compose.home.yml)
            if compose_cmd up -d --build --force-recreate --wait --wait-timeout 240 api realtime caddy; then
              echo "Rollback release is healthy: $candidate"
              compose_cmd ps
              return 0
            fi
            dump_deploy_diagnostics
            return 1
          }

          rollback_on_error() {
            status=$?
            trap - ERR
            echo "Deploy failed with status $status" >&2
            dump_deploy_diagnostics

            rollback_candidates=()
            if [ -n "${previous_current:-}" ] && [ -d "$previous_current" ]; then
              rollback_candidates+=("$previous_current")
            fi

            releases_dir="$(dirname "$REMOTE_RELEASE_DIR")"
            while IFS= read -r dir; do
              dir_real="$(readlink -f "$dir" || true)"
              if [ -z "$dir_real" ] || [ "$dir_real" = "$remote_release_real" ]; then
                continue
              fi
              already_added=false
              for existing in "${rollback_candidates[@]}"; do
                existing_real="$(readlink -f "$existing" || true)"
                if [ "$existing_real" = "$dir_real" ]; then
                  already_added=true
                  break
                fi
              done
              if [ "$already_added" = false ]; then
                rollback_candidates+=("$dir_real")
              fi
            done < <(find "$releases_dir" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' | sort -rn | awk '{print $2}')

            for candidate in "${rollback_candidates[@]}"; do
              if rollback_to_release "$candidate"; then
                exit "$status"
              fi
            done

            echo "Rollback did not find a healthy release" >&2
            exit "$status"
          }

          trap rollback_on_error ERR

          compose_cmd config >/dev/null

          compose_cmd --profile migrate run --rm -T --build migrate \
            node scripts/recover-failed-prisma-migration.mjs \
              20260614130000_flatten_store_cash_org_tree

          compose_cmd --profile migrate run --rm -T --build migrate

          compose_cmd up -d --build --force-recreate --wait --wait-timeout 240 api realtime caddy

          expected_app_env="${APP_VERSION}|${APP_BUILD_NUMBER}|${APP_VERSION}|${APP_BUILD_NUMBER}"
          for attempt in {1..12}; do
            current_app_env="$(
              compose_cmd \
                exec -T api sh -lc \
                'printf "%s|%s|%s|%s" "$APP_ANDROID_APP_VERSION" "$APP_ANDROID_APP_BUILD_NUMBER" "$APP_WINDOWS_APP_VERSION" "$APP_WINDOWS_APP_BUILD_NUMBER"' \
                2>/dev/null || true
            )"
            if [ "$current_app_env" = "$expected_app_env" ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "API container app-version env mismatch after recreate: expected $expected_app_env got ${current_app_env:-<empty>}" >&2
              exit 1
            fi
            sleep 5
          done

          compose_cmd ps

          releases_dir="$(dirname "$REMOTE_RELEASE_DIR")"
          current_real="$(readlink -f "$CURRENT_DIR" || true)"
          mapfile -t release_dirs < <(find "$releases_dir" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' | sort -rn | awk '{print $2}')
          kept=0
          for dir in "${release_dirs[@]}"; do
            dir_real="$(readlink -f "$dir")"
            if [ "$dir_real" = "$current_real" ] || [ "$kept" -lt 5 ]; then
              kept=$((kept + 1))
              continue
            fi
            rm -rf "$dir"
          done

          mapfile -t client_files < <(find /srv/opshub/downloads -maxdepth 1 -type f \( -name 'phongvu-opshub-v*.apk' -o -name 'phongvu-opshub-windows-v*.zip' -o -name 'phongvu-opshub-windows-setup-v*.exe' -o -name 'phongvu-opshub-windows-v*.sha256' \) -printf '%T@ %p\n' | sort -rn | awk '{print $2}')
          kept=0
          for file in "${client_files[@]}"; do
            if [ "$kept" -lt 20 ]; then
              kept=$((kept + 1))
              continue
            fi
            rm -f "$file"
          done

          case "$CLIENT_STAGING_DIR" in
            "$OPSHUB_REMOTE_APP_DIR"/action-staging/*)
              rm -rf "$CLIENT_STAGING_DIR"
              ;;
            *)
              echo "Refusing to remove unexpected staging directory: $CLIENT_STAGING_DIR" >&2
              exit 1
              ;;
          esac
          REMOTE

      - name: Verify public health and version metadata
        shell: bash
        run: |
          set -euo pipefail
          retry_curl() {
            local url="$1"
            local attempt
            for attempt in {1..12}; do
              if curl -fsS "$url"; then
                return 0
              fi
              sleep 5
            done
            curl -fsS "$url"
          }

          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/health"
          android_json="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=android")"
          windows_json="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=windows")"
          node -e "
            const android = JSON.parse(process.argv[1]);
            const windows = JSON.parse(process.argv[2]);
            const expectedBuild = Number(process.argv[3]);
            if (android.latestBuild !== expectedBuild) {
              throw new Error(\`Android latestBuild expected \${expectedBuild}, got \${android.latestBuild}\`);
            }
            if (windows.latestBuild !== expectedBuild) {
              throw new Error(\`Windows latestBuild expected \${expectedBuild}, got \${windows.latestBuild}\`);
            }
            if (!String(android.updateUrl || '').endsWith('.apk')) {
              throw new Error('Android updateUrl is not an APK');
            }
            if (!String(windows.updateUrl || '').endsWith('.exe')) {
              throw new Error('Windows updateUrl is not an installer EXE');
            }
          " "$android_json" "$windows_json" "${{ needs.prepare.outputs.version_code }}"
          curl -fIs "$(node -e "console.log(JSON.parse(process.argv[1]).updateUrl)" "$android_json")" >/dev/null
          curl -fIs "$(node -e "console.log(JSON.parse(process.argv[1]).updateUrl)" "$windows_json")" >/dev/null
          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/download" >/dev/null
          manifest_json="$(retry_curl "${OPSHUB_PUBLIC_BASE_URL}/downloads/latest.json")"
          node -e "
            const manifest = JSON.parse(process.argv[1]);
            const expectedVersion = process.argv[2];
            const expectedBuild = Number(process.argv[3]);
            if (manifest.version !== expectedVersion) {
              throw new Error('Download manifest version expected ' + expectedVersion + ', got ' + manifest.version);
            }
            if (manifest.build !== expectedBuild) {
              throw new Error('Download manifest build expected ' + expectedBuild + ', got ' + manifest.build);
            }
            const required = ['apk', 'windowsInstaller', 'windowsZip', 'windowsChecksum'];
            for (const key of required) {
              const file = manifest.files?.[key];
              if (!file?.url || !file?.fileName || !Number.isInteger(file.sizeBytes) || file.sizeBytes <= 0) {
                throw new Error('Download manifest file entry is invalid: ' + key);
              }
            }
            if (!manifest.files.apk.url.endsWith('.apk')) throw new Error('APK URL is invalid');
            if (!manifest.files.windowsInstaller.url.endsWith('.exe')) throw new Error('Windows installer URL is invalid');
            if (!manifest.files.windowsZip.url.endsWith('.zip')) throw new Error('Windows ZIP URL is invalid');
            if (!manifest.files.windowsChecksum.url.endsWith('.sha256')) throw new Error('Windows checksum URL is invalid');
          " "$manifest_json" "${{ needs.prepare.outputs.version_name }}" "${{ needs.prepare.outputs.version_code }}"
          node -e "
            const manifest = JSON.parse(process.argv[1]);
            for (const file of Object.values(manifest.files)) console.log(file.url);
          " "$manifest_json" | while IFS= read -r url; do
            curl -fIs "$url" >/dev/null
          done

  deploy_download_static:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_client_build == true }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm static-only deploy
        shell: bash
        run: |
          set -euo pipefail
          echo 'Static-only deploy requested; Android and Windows build jobs are skipped.'

      - name: Capture live app-version metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/downloads
          curl -fsS "${OPSHUB_API_BASE_URL}/app-version?platform=android" > dist/downloads/android-before.json
          curl -fsS "${OPSHUB_API_BASE_URL}/app-version?platform=windows" > dist/downloads/windows-before.json

      - name: Write download manifest from live artifacts
        shell: bash
        env:
          DOWNLOAD_MANIFEST_OUTPUT: dist/downloads/latest.json
        run: |
          set -euo pipefail
          node scripts/download-manifest.mjs from-live

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.OPSHUB_VPS_HOST }}
          version: latest

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.OPSHUB_VPS_HOST }}
          VPS_PORT: ${{ secrets.OPSHUB_VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.OPSHUB_VPS_USER || 'ubuntu' }}
          VPS_SSH_KEY: ${{ secrets.OPSHUB_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/opshub_deploy_key
          chmod 600 ~/.ssh/opshub_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          {
            echo "Host opshub-vps"
            echo "  HostName $VPS_HOST"
            echo "  Port $VPS_PORT"
            echo "  User $VPS_USER"
            echo "  IdentityFile ~/.ssh/opshub_deploy_key"
            echo "  IdentitiesOnly yes"
          } >> ~/.ssh/config

      - name: Upload download landing files and reload Caddy
        shell: bash
        run: |
          set -euo pipefail
          caddy_tmp="/tmp/opshub-Caddyfile-${GITHUB_SHA}"
          ssh opshub-vps "mkdir -p /srv/opshub/downloads"
          scp 'dist/downloads/latest.json' \
            'opshub-vps:/srv/opshub/downloads/latest.json'
          scp 'deploy/home-server/download.html' \
            'opshub-vps:/srv/opshub/downloads/download.html'
          scp 'web/icons/Icon-192.png' \
            'opshub-vps:/srv/opshub/downloads/opshub-icon-192.png'
          scp 'deploy/home-server/Caddyfile' "opshub-vps:${caddy_tmp}"

          ssh opshub-vps \
            "CURRENT_DIR='${OPSHUB_REMOTE_APP_DIR}/current' \
             OPSHUB_ENV_FILE='$OPSHUB_ENV_FILE' \
             CADDY_TMP='$caddy_tmp' \
             bash -s" <<'REMOTE'
          set -euo pipefail
          if [ ! -d "$CURRENT_DIR/deploy/home-server" ]; then
            echo "Current deploy directory is missing: $CURRENT_DIR/deploy/home-server" >&2
            exit 1
          fi
          docker run --rm \
            --env-file "$OPSHUB_ENV_FILE" \
            -v "$CADDY_TMP:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile < /dev/null
          install -m 0644 "$CADDY_TMP" "$CURRENT_DIR/deploy/home-server/Caddyfile"
          rm -f "$CADDY_TMP"
          cd "$CURRENT_DIR"
          export OPSHUB_ENV_FILE
          compose=(docker compose --env-file "$OPSHUB_ENV_FILE" -f deploy/home-server/docker-compose.home.yml)
          compose_cmd() {
            "${compose[@]}" "$@" < /dev/null
          }

          compose_cmd up -d --no-deps caddy
          if ! compose_cmd exec -T caddy caddy reload --config /etc/caddy/Caddyfile; then
            compose_cmd restart caddy
          fi
          compose_cmd ps caddy
          REMOTE

      - name: Verify static download deploy
        shell: bash
        run: |
          set -euo pipefail
          retry_curl() {
            local url="$1"
            local attempt
            for attempt in {1..12}; do
              if curl -fsS "$url"; then
                return 0
              fi
              sleep 5
            done
            curl -fsS "$url"
          }

          retry_curl "${OPSHUB_PUBLIC_BASE_URL}/download" >/dev/null
          manifest_json="$(retry_curl "${OPSHUB_PUBLIC_BASE_URL}/downloads/latest.json")"
          android_after="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=android")"
          windows_after="$(retry_curl "${OPSHUB_API_BASE_URL}/app-version?platform=windows")"
          node -e "
            const fs = require('node:fs');
            const manifest = JSON.parse(process.argv[1]);
            const androidBefore = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
            const windowsBefore = JSON.parse(fs.readFileSync(process.argv[3], 'utf8'));
            const androidAfter = JSON.parse(process.argv[4]);
            const windowsAfter = JSON.parse(process.argv[5]);
            if (JSON.stringify(androidBefore) !== JSON.stringify(androidAfter)) {
              throw new Error('Android app-version changed during static-only deploy');
            }
            if (JSON.stringify(windowsBefore) !== JSON.stringify(windowsAfter)) {
              throw new Error('Windows app-version changed during static-only deploy');
            }
            if (manifest.version !== androidAfter.latestVersion || manifest.build !== androidAfter.latestBuild) {
              throw new Error('Download manifest does not match live Android metadata');
            }
            const required = ['apk', 'windowsInstaller', 'windowsZip', 'windowsChecksum'];
            for (const key of required) {
              const file = manifest.files?.[key];
              if (!file?.url || !file?.fileName || !Number.isInteger(file.sizeBytes) || file.sizeBytes <= 0) {
                throw new Error('Download manifest file entry is invalid: ' + key);
              }
            }
          " "$manifest_json" dist/downloads/android-before.json dist/downloads/windows-before.json "$android_after" "$windows_after"
          node -e "
            const manifest = JSON.parse(process.argv[1]);
            for (const file of Object.values(manifest.files)) console.log(file.url);
          " "$manifest_json" | while IFS= read -r url; do
            curl -fIs "$url" >/dev/null
          done
