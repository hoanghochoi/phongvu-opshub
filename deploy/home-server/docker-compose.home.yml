x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  postgres:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the runtime env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the runtime env file}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in the runtime env file}
    volumes:
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/postgres:/var/lib/postgresql/data
    networks:
      - opshub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in the runtime env file}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD in the runtime env file}",
      ]
    volumes:
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/redis:/data
    networks:
      - opshub
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q '^PONG$'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  migrate:
    build:
      context: ../../backend-nest
      target: ops
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the runtime env file}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - opshub
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,mode=1777
      - /home/node/.cache:rw,noexec,nosuid,size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    profiles:
      - migrate

  api:
    build:
      context: ../../backend-nest
      target: runtime
    restart: unless-stopped
    env_file:
      - ${OPSHUB_ENV_FILE:?Set OPSHUB_ENV_FILE to the runtime env file path}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/uploads:/data/app_images
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/private-media:/data/private-media
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/payment-audio:/data/payment-audio
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/import:/data/import:ro
      - ../../docs/help:/app/docs/help:ro
      - ../../data:/app/data:ro
      - ../../assets/icon/source:/app/assets/icon/source:ro
      - ../../assets/icon/acare_logo.png:/app/assets/icon/acare_logo.png:ro
      - ../../fonts:/app/fonts:ro
    networks:
      - opshub
    init: true
    user: "${OPSHUB_RUNTIME_UID:?Set OPSHUB_RUNTIME_UID}:${OPSHUB_RUNTIME_GID:?Set OPSHUB_RUNTIME_GID}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m,mode=1777
      - /home/node/.cache:rw,noexec,nosuid,size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 8
    logging: *default-logging

  maintenance:
    build:
      context: ../../backend-nest
      target: ops
    env_file:
      - ${OPSHUB_ENV_FILE:?Set OPSHUB_ENV_FILE to the runtime env file path}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/uploads:/data/app_images
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/private-media:/data/private-media
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/payment-audio:/data/payment-audio
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/import:/data/import:ro
      - ../../data:/app/data:ro
    networks:
      - opshub
    user: "${OPSHUB_RUNTIME_UID:?Set OPSHUB_RUNTIME_UID}:${OPSHUB_RUNTIME_GID:?Set OPSHUB_RUNTIME_GID}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m,mode=1777
      - /home/node/.cache:rw,noexec,nosuid,size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["node", "--version"]
    profiles:
      - maintenance
    logging: *default-logging

  realtime:
    build:
      context: ../../backend-go
    restart: unless-stopped
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      WS_ALLOW_LEGACY_JWT: ${WS_ALLOW_LEGACY_JWT:-false}
      JWT_SECRET: ${REALTIME_LEGACY_JWT_SECRET:-}
      PORT: 8080
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in the runtime env file}
      REDIS_DB: ${REDIS_DB:-0}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - opshub
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    environment:
      OPSHUB_DOMAIN: ${OPSHUB_DOMAIN:?Set OPSHUB_DOMAIN in the runtime env file}
    depends_on:
      - api
      - realtime
    ports:
      - "${OPSHUB_HTTP_BIND:?Set OPSHUB_HTTP_BIND to an explicit loopback binding}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/caddy/data:/data
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/caddy/config:/config
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/uploads:/srv/uploads:ro
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/downloads:/srv/downloads:ro
      - ${OPSHUB_SSD_ROOT:-/srv/opshub}/web:/srv/web:ro
    networks:
      - opshub
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

networks:
  opshub:
    driver: bridge
